<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>WA Bulk Sender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>WA Bulk Sender</h2>

    <label>Import dari Excel/CSV</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
    <div id="fileInfo" class="hint"></div>

    <label>Tambah Manual (pisah baris / koma / spasi, lalu Enter)</label>
    <textarea id="contactInput" placeholder="628123456789&#10;628987654321"></textarea>
    <button id="addBtn" class="small">Tambah ke Daftar</button>

    <label>Daftar Kontak (<span id="count">0</span>)</label>
    <div id="chips"></div>
    <button id="clearAllBtn" class="small secondary">Hapus Semua</button>

    <label>Template Pesan <span id="varHint" class="hint"></span></label>
    <div class="toolbar">
        <button type="button" class="fmt-btn" data-fmt="bold" title="Bold (Ctrl+B)"><b>B</b></button>
        <button type="button" class="fmt-btn" data-fmt="italic" title="Italic (Ctrl+I)"><i>I</i></button>
        <button type="button" class="fmt-btn" data-fmt="strike" title="Strikethrough"><s>S</s></button>
        <button type="button" class="fmt-btn" data-fmt="mono" title="Monospace"><code>M</code></button>
        <button type="button" class="fmt-btn" data-fmt="bullet" title="Bullet list">•</button>
        <button type="button" class="fmt-btn" data-fmt="quote" title="Quote">&gt;</button>
        <button type="button" class="fmt-btn" id="varBtn" title="Sisip variabel">{ }</button>
    </div>
    <div class="textarea-wrap">
        <textarea id="message" placeholder="Halo *{nama}*, undangan Anda sudah siap"></textarea>
        <div id="autocomplete" class="autocomplete hidden"></div>
    </div>
    <div id="preview" class="preview hint"></div>

    <div class="row">
        <div>
            <label>Delay Min (detik)</label>
            <input type="number" id="minDelay" value="10" min="3">
        </div>
        <div>
            <label>Delay Max (detik)</label>
            <input type="number" id="maxDelay" value="25" min="3">
        </div>
    </div>

    <div class="btn-row">
        <button id="startBtn">Mulai Kirim</button>
        <button id="stopBtn" class="secondary">Stop</button>
    </div>

    <div id="status"></div>

    <script src="xlsx.full.min.js"></script>
    <script src="popup.js"></script>
</body>
</html>
