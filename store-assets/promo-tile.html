<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Promo Tile – WA Bulk Sender</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 440px;
      height: 280px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .tile {
      width: 440px;
      height: 280px;
      position: relative;
      background: linear-gradient(135deg, #064E3B 0%, #065F46 40%, #047857 100%);
      overflow: hidden;
    }

    /* Radial glow */
    .tile::before {
      content: "";
      position: absolute;
      top: -80px; right: -80px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(37,211,102,0.35), transparent 65%);
      border-radius: 50%;
    }

    /* Bottom glow */
    .tile::after {
      content: "";
      position: absolute;
      bottom: -60px; left: -60px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 65%);
      border-radius: 50%;
    }

    /* Grid dots */
    .dots {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* Decorative circles */
    .circle-1 {
      position: absolute;
      top: -40px; right: 100px;
      width: 180px; height: 180px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.07);
    }

    .circle-2 {
      position: absolute;
      top: -10px; right: 130px;
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* Content */
    .content {
      position: relative;
      z-index: 2;
      padding: 32px 32px 28px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 28px;
    }

    /* Icon block */
    .icon-block {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .icon-wrap {
      width: 80px; height: 80px;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 22px;
      display: grid;
      place-items: center;
      backdrop-filter: blur(8px);
      box-shadow:
        0 8px 32px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .icon-wrap img {
      width: 56px; height: 56px;
      object-fit: contain;
    }

    .pill {
      background: #25D366;
      color: #fff;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      box-shadow: 0 3px 10px rgba(37,211,102,0.45);
      white-space: nowrap;
    }

    /* Text block */
    .text-block { flex: 1; }

    .ext-label {
      font-size: 10px;
      color: rgba(255,255,255,0.55);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    h1 .green {
      color: #6EE7B7;
    }

    .tagline {
      font-size: 12.5px;
      color: rgba(255,255,255,0.65);
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .feat-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .fp {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 10px;
      color: rgba(255,255,255,0.85);
      font-weight: 500;
    }

    .fp .dot {
      width: 5px; height: 5px;
      background: #25D366;
      border-radius: 50%;
    }

    /* Bottom strip */
    .bottom-strip {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #25D366, #34d399, #6ee7b7, #25D366);
      background-size: 200% 100%;
    }
  </style>
</head>
<body>
  <div class="tile">
    <div class="dots"></div>
    <div class="circle-1"></div>
    <div class="circle-2"></div>

    <div class="content">
      <!-- Icon -->
      <div class="icon-block">
        <div class="icon-wrap">
          <img src="../icons/icon128.png" alt="WA Bulk Sender">
        </div>
        <div class="pill">Chrome Extension</div>
      </div>

      <!-- Text -->
      <div class="text-block">
        <div class="ext-label">WhatsApp Productivity</div>
        <h1>WA <span class="green">Bulk</span><br>Sender</h1>
        <p class="tagline">Send personalized messages to hundreds of contacts via WhatsApp Web.</p>
        <div class="feat-pills">
          <div class="fp"><span class="dot"></span> Excel Import</div>
          <div class="fp"><span class="dot"></span> {variables}</div>
          <div class="fp"><span class="dot"></span> Media</div>
          <div class="fp"><span class="dot"></span> Smart Delay</div>
        </div>
      </div>
    </div>

    <div class="bottom-strip"></div>
  </div>
</body>
</html>
